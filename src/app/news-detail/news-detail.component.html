<ion-header class="ion-no-border">
  <ion-toolbar class="bg-darkBg py-2 px-4 border-b border-glassBg shadow-neon-blue">
    <ion-buttons slot="start">
      <ion-button (click)="goBack()" class="text-neonBlue">
        <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="text-neonBlue font-bold tracking-widest text-xl font-sans">DETAILS</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="bg-darkBg">
  <div *ngIf="newsItem$ | async as item; else loading" class="relative min-h-full">
    <!-- Hero Image -->
    <div *ngIf="item.image" class="w-full h-72 relative">
      <img [src]="item.image" class="w-full h-full object-cover">
      <div class="absolute inset-0 bg-gradient-to-t from-darkBg to-transparent opacity-80"></div>
    </div>

    <div class="p-6 -mt-12 relative">
      <div class="bg-[#0d0d14] rounded-3xl p-6 border border-glassBg shadow-2xl">
        <span class="text-xs font-semibold uppercase text-neonPink tracking-widest mb-4 inline-block">{{ item.topic }}</span>
        <h1 class="text-3xl font-bold text-white leading-tight mb-4">{{ item.title }}</h1>
        
        <div class="flex items-center space-x-3 text-xs text-gray-400 font-mono mb-6 pb-6 border-b border-glassBg">
           <span class="px-2 py-1 bg-glassBg rounded-md border border-neonPurple text-neonPurple">{{ item.source }}</span>
           <span>•</span>
           <span>{{ item.publishedAt | date:'short' }}</span>
        </div>

        <p class="text-gray-300 leading-relaxed text-lg mb-8 font-sans">
          {{ item.description || 'Intercepted transmission content follows: Seeking additional details from secondary relays.' }}
        </p>

        <a [href]="item.url" target="_blank" class="block w-full text-center py-4 rounded-xl bg-neonBlue text-black font-bold tracking-widest hover:shadow-neon-blue transition-all duration-300">
          VIEW FULL SOURCE 
        </a>
      </div>
    </div>
  </div>

  <ng-template #loading>
    <div class="flex flex-col items-center justify-center min-h-screen text-neonBlue font-mono">
      <ion-spinner name="crescent" class="mb-4"></ion-spinner>
      <span>ENCRYPTING DATA...</span>
    </div>
  </ng-template>
</ion-content>
