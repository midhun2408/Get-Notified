<ion-header class="ion-no-border">
  <ion-toolbar class="bg-darkBg py-2 px-4 border-b border-glassBg shadow-neon-purple">
    <ion-buttons slot="start">
      <ion-button (click)="goBack()" class="text-neonBlue">
        <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title class="text-neonPurple font-bold tracking-widest text-xl font-sans">DATALINK</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="bg-darkBg">
  <div class="p-4 bg-darkBg min-h-full">
    
    <div class="mb-8 mt-4">
      <h2 class="text-gray-300 font-mono text-xs tracking-[0.2em] mb-4 uppercase">Initialize New Topic</h2>
      
      <div class="relative flex items-center">
        <div class="absolute inset-0 bg-neonBlue opacity-20 blur rounded-xl"></div>
        <div class="relative flex w-full bg-[#0d0d14] rounded-xl border border-neonBlue shadow-neon-blue overflow-hidden focus-within:ring-2 ring-neonBlue">
          <input 
            type="text" 
            [(ngModel)]="newTopic" 
            (keyup.enter)="addTopic()"
            placeholder="e.g. Cybernetics..." 
            class="flex-1 bg-transparent text-white px-4 py-3 outline-none font-mono placeholder-gray-600">
          <button 
            (click)="addTopic()" 
            class="px-5 bg-glassBg text-neonBlue font-bold border-l border-neonBlue hover:bg-neonBlue hover:text-black transition-colors duration-300">
            ADD
          </button>
        </div>
      </div>
    </div>

    <div>
      <h2 class="text-gray-300 font-mono text-xs tracking-[0.2em] mb-4 uppercase">Active Transmissions</h2>
      
      <div class="space-y-3">
        <div *ngFor="let topic of topics" class="group relative flex justify-between items-center p-4 bg-[#0d0d14] rounded-xl border border-glassBg hover:border-neonPurple transition-colors duration-300">
          <span class="text-gray-100 font-medium tracking-wide">{{ topic }}</span>
          <button (click)="removeTopic(topic)" class="text-gray-500 hover:text-neonPink transition-colors p-1">
            <ion-icon name="close-circle-outline" class="text-xl"></ion-icon>
          </button>
        </div>

        <div *ngIf="topics.length === 0" class="text-center text-gray-400 mt-10 font-mono text-sm">
          No topics initialized.
        </div>
      </div>
    </div>

  </div>
</ion-content>
